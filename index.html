<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPL Cricket Tournament 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  color:white;
  background:#020617;
  overflow-x:hidden;
}

/* STADIUM LIGHT EFFECT */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background: radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 60%),
              radial-gradient(circle at 20% 30%, rgba(34,197,94,0.2), transparent);
  animation:moveBg 12s infinite alternate ease-in-out;
  z-index:-1;
}

@keyframes moveBg{
  0%{transform:translate(0,0)}
  100%{transform:translate(-100px,-100px)}
}

/* HERO */
.hero{
  text-align:center;
  padding:50px 20px;
}

.hero h1{
  font-size:3rem;
  font-weight:700;
}

.highlight{
  color:#22c55e;
}

.meta{
  color:#94a3b8;
}

/* FORM */
.form-container{
  max-width:520px;
  margin:30px auto;
  background:rgba(15,23,42,0.85);
  backdrop-filter:blur(12px);
  padding:30px;
  border-radius:15px;
  box-shadow:0 0 40px rgba(34,197,94,0.15);
}

input,textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:6px;
  background:#1e293b;
  color:white;
}

.cta-btn{
  width:100%;
  background:#22c55e;
  padding:14px;
  border:none;
  border-radius:30px;
  font-weight:600;
  cursor:pointer;
}

/* LEADERBOARD */
.section{
  text-align:center;
  padding:50px 20px;
}

.leaderboard-container{
  max-width:900px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

/* CARDS */
.leader-card{
  padding:20px;
  border-radius:15px;
  background:rgba(15,23,42,0.9);
  border:1px solid rgba(255,255,255,0.1);
  transition:.3s;
}

.leader-card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 35px rgba(34,197,94,0.5);
}

/* TOP 3 STYLING */
.rank-1{
  border:2px solid gold;
  box-shadow:0 0 30px gold;
}
.rank-2{
  border:2px solid silver;
}
.rank-3{
  border:2px solid #cd7f32;
}

/* TEXT */
.rank{
  font-weight:700;
  margin-bottom:5px;
}

.name{
  font-size:1.2rem;
}

.votes{
  font-size:0.9rem;
  opacity:.8;
}

/* PROGRESS BAR */
.bar{
  height:6px;
  background:#1e293b;
  border-radius:10px;
  margin-top:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  background:#22c55e;
  width:0%;
  transition:width 1s ease;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  color:black;
  padding:12px;
  border-radius:6px;
  opacity:0;
  transition:.3s;
}
.toast.show{opacity:1}

footer{
  text-align:center;
  padding:20px;
  opacity:.6;
}
</style>
</head>

<body>

<section class="hero">
  <h1>GPL Cricket Tournament 2026 🏏</h1>
  <p class="highlight">Captains will be girls</p>
  <div class="meta">📅 4th April 2026</div>
</section>

<form class="form-container" id="nominationForm">
  <h2>Nominate a Captain</h2>

  <input type="text" name="nominee_name" placeholder="Nominee Name" required>
  <input type="email" name="email" placeholder="Your Email" required>
  <textarea name="reason" placeholder="Why should they be captain?"></textarea>
  <input type="text" name="your_name" placeholder="Your Name">

  <button class="cta-btn">Submit Nomination</button>
</form>

<section class="section">
  <h2>🏆 Leaderboard</h2>
  <div id="leaderboard" class="leaderboard-container"></div>
</section>

<footer>
  © GPL Tournament 2026 | Golden Eagle
</footer>

<div class="toast" id="toast">Nomination submitted 🎉</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyxESmYTw131TQQWpBix3t_rhyzesIZqAYhJqxeMB9bp9Z6kYP_2wYkNHqkniEVPPdapA/exec";

const form=document.getElementById("nominationForm");

form.addEventListener("submit",async(e)=>{
  e.preventDefault();

  const data={
    nominee_name:form.nominee_name.value,
    your_name:form.your_name.value,
    email:form.email.value,
    reason:form.reason.value
  };

  await fetch(API_URL,{method:"POST",body:JSON.stringify(data)});

  showToast();
  triggerConfetti();
  form.reset();
  loadLeaderboard();
});

/* LEADERBOARD */
async function loadLeaderboard(){
  const res=await fetch(API_URL);
  const data=await res.json();

  const counts={};
  data.forEach(d=>{
    counts[d.nominee_name]=(counts[d.nominee_name]||0)+1;
  });

  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,4);

  const maxVotes=sorted[0]?.[1]||1;

  const container=document.getElementById("leaderboard");
  container.innerHTML="";

  sorted.forEach((item,index)=>{
    const percent=(item[1]/maxVotes)*100;

    const div=document.createElement("div");
    div.className=`leader-card rank-${index+1}`;

    div.innerHTML=`
      <div class="rank">#${index+1}</div>
      <div class="name">${item[0]}</div>
      <div class="votes">${item[1]} votes</div>
      <div class="bar"><div class="fill" style="width:${percent}%"></div></div>
    `;

    container.appendChild(div);
  });
}

/* AUTO REFRESH */
setInterval(loadLeaderboard,5000);
loadLeaderboard();

/* UI */
function showToast(){
  const t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}

function triggerConfetti(){
  const end=Date.now()+2000;
  (function frame(){
    confetti({particleCount:10,spread:100,origin:{y:0.6}});
    if(Date.now()<end) requestAnimationFrame(frame);
  })();
}
</script>

</body>
</html>
