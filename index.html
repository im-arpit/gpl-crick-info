<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPL Tournament 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:#020617;
  color:white;
  overflow:hidden;
}

/* CINEMATIC OVERLAY */
.intro{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
  animation:fadeOut 2s ease forwards;
  animation-delay:2s;
}

.intro h1{
  font-size:2rem;
  letter-spacing:3px;
  animation:zoomIn 2s ease;
}

@keyframes zoomIn{
  from{opacity:0;transform:scale(0.5)}
  to{opacity:1;transform:scale(1)}
}

@keyframes fadeOut{
  to{opacity:0;visibility:hidden}
}

/* STADIUM LIGHT SWEEP */
.light{
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle, rgba(255,255,255,0.08), transparent);
  animation:moveLight 8s infinite linear;
  z-index:-1;
}

@keyframes moveLight{
  0%{transform:translate(-50%,-50%)}
  100%{transform:translate(0,0)}
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
}

.logo{
  height:40px;
  animation:float 4s infinite;
}

@keyframes float{
  50%{transform:translateY(-5px)}
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

/* CAPTAIN REVEAL */
.reveal{
  text-align:center;
  margin-top:40px;
}

.captain{
  font-size:2rem;
  margin:20px;
  opacity:0;
  transform:translateY(50px);
}

/* reveal animation */
.show{
  animation:reveal 1s forwards;
}

@keyframes reveal{
  to{opacity:1;transform:translateY(0)}
}

/* glow */
.glow{
  color:#facc15;
  text-shadow:0 0 20px gold;
}

/* TEAMS */
.teams{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:40px;
}

.team{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:10px;
  text-align:center;
}

/* HIDE SCROLL INITIALLY */
.hidden{
  overflow:hidden;
}
</style>
</head>

<body class="hidden">

<!-- INTRO -->
<div class="intro">
  <h1>GPL 2026</h1>
  <p>Captain Reveal</p>
</div>

<div class="light"></div>

<nav>
  <img src="assets/org-logo.webp" class="logo">
  <h2>GPL 🏏</h2>
</nav>

<section class="hero">
  <h1>Captain Announcement</h1>

  <div class="reveal">
    <div id="c1" class="captain">Mili</div>
    <div id="c2" class="captain">Isha Mishra</div>
  </div>

  <p style="margin-top:20px;opacity:.7">
    Surbhi Baghel, Palak, Riya and Khushi are tied (4 votes each).  
    Final decision soon.
  </p>
</section>

<section class="teams">
  <div class="team"><h3>Team A</h3><p class="glow">👑 Mili</p></div>
  <div class="team"><h3>Team B</h3><p class="glow">👑 Isha Mishra</p></div>
  <div class="team"><h3>Team C</h3><p>Captain TBD</p></div>
  <div class="team"><h3>Team D</h3><p>Captain TBD</p></div>
</section>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
setTimeout(()=>{
  document.body.classList.remove("hidden");

  const c1=document.getElementById("c1");
  const c2=document.getElementById("c2");

  setTimeout(()=>{
    c1.classList.add("show","glow");
  },500);

  setTimeout(()=>{
    c2.classList.add("show","glow");
  },1500);

  // confetti finale
  setTimeout(()=>{
    confetti({
      particleCount:150,
      spread:120,
      origin:{y:0.6}
    });
  },2500);

},2000);
</script>

</body>
</html>
