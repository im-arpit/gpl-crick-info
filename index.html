<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPL Cricket Tournament 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  color:white;
  background:#020617;
  overflow-x:hidden;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background: radial-gradient(circle at 20% 30%, rgba(34,197,94,0.15), transparent),
              radial-gradient(circle at 80% 70%, rgba(59,130,246,0.15), transparent);
  animation:moveBg 10s infinite alternate ease-in-out;
  z-index:-1;
}

@keyframes moveBg{
  0%{transform:translate(0,0)}
  100%{transform:translate(-100px,-100px)}
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 20px;
}

.hero h1{
  font-size:2.8rem;
}

.highlight{
  color:#22c55e;
}

.meta{
  color:#94a3b8;
}

/* FORM */
.form-container{
  max-width:520px;
  margin:30px auto;
  background:rgba(15,23,42,0.9);
  padding:30px;
  border-radius:12px;
}

input,textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:6px;
  background:#1e293b;
  color:white;
}

.cta-btn{
  width:100%;
  background:#22c55e;
  padding:14px;
  border:none;
  border-radius:30px;
  font-weight:600;
  cursor:pointer;
}

/* LEADERBOARD */
.section{
  text-align:center;
  padding:40px 20px;
}

.leaderboard-container{
  max-width:900px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.leader-card{
  background:rgba(15,23,42,0.9);
  padding:20px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  transition:.3s;
}

.leader-card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 25px rgba(34,197,94,0.4);
}

.rank{
  color:#22c55e;
}

footer{
  text-align:center;
  padding:20px;
  opacity:.6;
}

.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  color:black;
  padding:12px;
  border-radius:6px;
  opacity:0;
  transition:.3s;
}

.toast.show{opacity:1}
</style>
</head>

<body>

<section class="hero">
  <h1>GPL Cricket Tournament 2026 🏏</h1>
  <p class="highlight">Captains will be girls</p>
  <div class="meta">📅 4th April 2026</div>
</section>

<form class="form-container" id="nominationForm">
  <h2>Nominate a Captain</h2>

  <input type="text" name="nominee_name" placeholder="Nominee Name" required>
  <input type="email" name="email" placeholder="Your Email" required>
  <textarea name="reason" placeholder="Why should they be captain?"></textarea>
  <input type="text" name="your_name" placeholder="Your Name">

  <button class="cta-btn">Submit Nomination</button>
</form>

<section class="section">
  <h2>🏆 Top Captain Nominations</h2>
  <div id="leaderboard" class="leaderboard-container"></div>
</section>

<footer>
  © GPL Tournament 2026 | Golden Eagle
</footer>

<div class="toast" id="toast">Nomination submitted 🎉</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyxESmYTw131TQQWpBix3t_rhyzesIZqAYhJqxeMB9bp9Z6kYP_2wYkNHqkniEVPPdapA/exec";

const form = document.getElementById("nominationForm");

form.addEventListener("submit", async function(e){
  e.preventDefault();

  const data = {
    nominee_name: form.nominee_name.value,
    your_name: form.your_name.value,
    email: form.email.value,
    reason: form.reason.value
  };

  await fetch(API_URL, {
    method:"POST",
    body: JSON.stringify(data)
  });

  showToast();
  triggerConfetti();
  form.reset();
  loadLeaderboard();
});

async function loadLeaderboard(){
  const res = await fetch(API_URL);
  const data = await res.json();

  const counts = {};
  data.forEach(d=>{
    counts[d.nominee_name]=(counts[d.nominee_name]||0)+1;
  });

  const sorted = Object.entries(counts)
    .sort((a,b)=>b[1]-a[1]);

  const container=document.getElementById("leaderboard");
  container.innerHTML="";

  sorted.forEach((item,index)=>{
    const div=document.createElement("div");
    div.className="leader-card";

    div.innerHTML=`
      <div class="rank">#${index+1}</div>
      <div>${item[0]}</div>
      <div>${item[1]} votes</div>
    `;

    container.appendChild(div);
  });
}

loadLeaderboard();

function showToast(){
  const t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}

function triggerConfetti(){
  const end=Date.now()+1500;
  (function frame(){
    confetti({particleCount:5,angle:60,spread:70,origin:{x:0}});
    confetti({particleCount:5,angle:120,spread:70,origin:{x:1}});
    if(Date.now()<end) requestAnimationFrame(frame);
  })();
}
</script>

</body>
</html>
