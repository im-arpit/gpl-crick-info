<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPL 2026 Broadcast</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  color:white;
  overflow:hidden;

  /* STADIUM GRASS */
  background:
    linear-gradient(to bottom,#0a2e0a,#021802),
    radial-gradient(circle at center,rgba(255,255,255,0.08),transparent);
}

/* FLOODLIGHTS */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 20% 0%,rgba(255,255,255,0.15),transparent),
    radial-gradient(circle at 80% 0%,rgba(255,255,255,0.15),transparent);
  animation:lights 6s infinite alternate;
  z-index:-1;
}
@keyframes lights{
  0%{transform:translateY(0)}
  100%{transform:translateY(-60px)}
}

/* SCOREBOARD HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:rgba(0,0,0,0.7);
  border-bottom:2px solid rgba(255,255,255,0.1);
}

.logo{
  height:40px;
  animation:float 3s infinite;
}
@keyframes float{50%{transform:translateY(-5px)}}

/* PITCH */
.pitch{
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  width:200px;
  height:400px;
  background:linear-gradient(#c2a66b,#a98e5a);
  opacity:0.2;
  border-radius:10px;
}

/* TROPHY */
.trophy{
  font-size:70px;
  text-align:center;
  margin-top:20px;
  animation:rise 1.5s ease forwards;
  opacity:0;
}
@keyframes rise{
  from{transform:translateY(200px);opacity:0}
  to{transform:translateY(0);opacity:1}
}

/* CAPTAIN */
.captain{
  font-size:2.5rem;
  text-align:center;
  opacity:0;
  transform:translateY(40px);
}
.show{
  animation:reveal 1s forwards;
}
@keyframes reveal{
  to{opacity:1;transform:translateY(0)}
}

.glow{
  color:#facc15;
  text-shadow:0 0 30px gold;
}

/* BALL SWING */
.ball{
  position:absolute;
  width:14px;
  height:14px;
  background:red;
  border-radius:50%;
  top:50%;
  left:-50px;
  box-shadow:0 0 15px red;
  animation:swing 4s linear infinite;
}
@keyframes swing{
  0%{left:-50px;top:50%}
  50%{top:40%}
  100%{left:110%;top:50%}
}

/* TEAMS */
.teams{
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:space-around;
}

.team{
  background:rgba(0,0,0,0.6);
  padding:15px;
  border-radius:10px;
  text-align:center;
  width:20%;
}

.team h3{color:#22c55e}
.captain-name{color:#facc15}

/* INTRO FLASH */
.flash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  animation:flash 1s ease;
}
@keyframes flash{
  0%{opacity:1}
  100%{opacity:0}
}
</style>
</head>

<body>

<div class="flash"></div>
<div class="pitch"></div>
<div class="ball"></div>

<div class="header">
  <img src="assets/org-logo.webp" class="logo">
  <h2>GPL 🏏 LIVE</h2>
</div>

<div class="trophy">🏆</div>

<div id="c1" class="captain">Mili</div>
<div id="c2" class="captain">Isha Mishra</div>

<p style="text-align:center;margin-top:10px;opacity:.7">
  Surbhi, Palak, Riya & Khushi tied (4 votes each). Final soon.
</p>

<div class="teams">
  <div class="team">
    <h3>Team A</h3>
    <p class="captain-name">👑 Mili</p>
  </div>
  <div class="team">
    <h3>Team B</h3>
    <p class="captain-name">👑 Isha Mishra</p>
  </div>
  <div class="team">
    <h3>Team C</h3>
    <p>TBD</p>
  </div>
  <div class="team">
    <h3>Team D</h3>
    <p>TBD</p>
  </div>
</div>

<!-- AUDIO -->
<audio id="cheer" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1e1b.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
setTimeout(()=>{
  const c1=document.getElementById("c1");
  const c2=document.getElementById("c2");

  c1.classList.add("show","glow");

  setTimeout(()=>{
    c2.classList.add("show","glow");
  },1000);

  setTimeout(()=>{
    confetti({particleCount:250,spread:140});
    document.getElementById("cheer").play();
  },2000);

},800);
</script>

</body>
</html>
