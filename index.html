<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPL Cricket Tournament 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  color:white;
  background:#020617;
  overflow-x:hidden;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background: radial-gradient(circle at 20% 30%, rgba(34,197,94,0.15), transparent),
              radial-gradient(circle at 80% 70%, rgba(59,130,246,0.15), transparent);
  animation:moveBg 10s infinite alternate ease-in-out;
  z-index:-1;
}

@keyframes moveBg{
  0%{transform:translate(0,0)}
  100%{transform:translate(-100px,-100px)}
}

/* HEADER */
header{
  display:flex;
  justify-content:center;
  padding:20px;
}

header img{
  height:55px;
}

/* HERO */
.hero{
  text-align:center;
  padding:30px 20px;
}

.hero h1{
  font-size:2.8rem;
  font-weight:700;
}

.highlight{
  color:#22c55e;
  margin-top:10px;
}

.meta{
  margin-top:8px;
  color:#94a3b8;
}

/* BAT */
.bat{
  position:absolute;
  right:10%;
  top:20%;
  width:10px;
  height:120px;
  background:#facc15;
  transform:rotate(30deg);
  border-radius:5px;
  opacity:0.7;
}

/* BALL */
.ball{
  position:absolute;
  left:10%;
  top:25%;
  width:14px;
  height:14px;
  background:#ef4444;
  border-radius:50%;
  box-shadow:0 0 10px rgba(239,68,68,0.8);
  animation:ballMove 4s infinite linear;
}

@keyframes ballMove{
  0%{transform:translateX(0)}
  100%{transform:translateX(120px)}
}

/* FORM */
.form-container{
  max-width:520px;
  margin:40px auto;
  background:rgba(15,23,42,0.9);
  padding:30px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 30px rgba(34,197,94,0.15);
}

h2{margin-bottom:15px}

input,textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:6px;
  background:#1e293b;
  color:white;
}

input:focus,textarea:focus{
  outline:none;
  border:1px solid #22c55e;
}

/* BUTTON */
.cta-btn{
  width:100%;
  margin-top:10px;
  background:#22c55e;
  color:black;
  padding:14px;
  border:none;
  border-radius:30px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.cta-btn:hover{
  background:#16a34a;
}

/* ANNOUNCEMENT */
.section{
  text-align:center;
  padding:50px 20px;
}

.announcement{
  color:#22c55e;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  color:black;
  padding:12px 20px;
  border-radius:6px;
  opacity:0;
  transition:.3s;
}

.toast.show{opacity:1}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  opacity:0.6;
}

@media(max-width:768px){
  .hero h1{font-size:2rem}
}
</style>
</head>

<body>

<div class="bat"></div>
<div class="ball"></div>

<header>
  <img src="./assets/org-logo.webp">
</header>

<section class="hero">
  <h1>GPL Cricket Tournament 2026 🏏</h1>
  <p class="highlight">This year, captains will be girls</p>
  <div class="meta">📅 4th April 2026</div>
</section>

<form class="form-container" id="nominationForm">
  <h2>Nominate a Captain</h2>

  <input type="text" name="nominee_name" placeholder="Nominee Name" required>
  <input type="email" name="email" placeholder="Your Email" required>
  <textarea name="reason" placeholder="Why should they be captain?"></textarea>
  <input type="text" name="your_name" placeholder="Your Name">

  <button class="cta-btn" type="submit">Submit Nomination</button>
</form>

<section class="section">
  <h2>Captains Announcement</h2>
  <p class="announcement">Captains will be announced soon 🎉</p>
</section>

<footer>
  © GPL Tournament 2026 | Golden Eagle 
</footer>

<div class="toast" id="toast">Nomination submitted successfully 🎉</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const form = document.getElementById("nominationForm");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const formData = new FormData(form);

  try {
    const response = await fetch("https://formspree.io/f/xeepqygr", {
      method: "POST",
      body: formData,
      headers: { 'Accept': 'application/json' }
    });

    if (response.ok) {
      showToast();
      triggerConfetti();
      form.reset();
    } else {
      alert("Submission failed. Try again.");
    }

  } catch {
    alert("Network error.");
  }
});

function showToast(){
  const toast=document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),3000);
}

function triggerConfetti(){
  const duration=1500;
  const end=Date.now()+duration;

  (function frame(){
    confetti({particleCount:6,angle:60,spread:80,origin:{x:0}});
    confetti({particleCount:6,angle:120,spread:80,origin:{x:1}});
    if(Date.now()<end) requestAnimationFrame(frame);
  })();
}
</script>

</body>
</html>
