<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPL Cricket Tournament</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Poppins', sans-serif;
  color: white;
  background: #020617;
  overflow-x:hidden;
}

/* BACKGROUND GLOW */
body::before {
  content:"";
  position:fixed;
  width:600px;
  height:600px;
  background: radial-gradient(circle, rgba(250,204,21,0.2), transparent);
  top:-200px;
  left:-200px;
  z-index:-1;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  position:absolute;
  width:100%;
  z-index:10;
}

header img { height:50px; }

nav a {
  margin-left:20px;
  color:white;
  text-decoration:none;
  opacity:0.8;
}

nav a:hover { opacity:1; }

/* HERO */
.hero {
  height:100vh;
  background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
              url('./assets/hero.jpeg') center/cover;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1 {
  font-size:3.2rem;
  font-weight:600;
}

.hero p {
  margin:20px 0;
  color:#cbd5f5;
}

.highlight {
  color:#facc15;
}

/* BUTTON */
.cta-btn {
  background:#facc15;
  color:black;
  padding:14px 30px;
  border-radius:40px;
  border:none;
  font-weight:600;
  cursor:pointer;
  transition: all 0.3s ease;
  animation: float 3s ease-in-out infinite;
}

.cta-btn:hover {
  transform: translateY(-4px) scale(1.05);
  box-shadow: 0 10px 30px rgba(250,204,21,0.5);
}

/* FLOAT */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0px); }
}

/* SECTION */
.section {
  padding:80px 20px;
  text-align:center;
}

/* GLASS CARD */
.form-container {
  max-width:500px;
  margin:auto;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding:30px;
  border-radius:15px;
  border:1px solid rgba(255,255,255,0.1);
}

/* INPUT */
input, textarea {
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.08);
  color:white;
}

input:focus, textarea:focus {
  outline:none;
  box-shadow: 0 0 0 2px #facc15;
}

/* ANNOUNCEMENT */
.announcement {
  margin-top:20px;
  font-size:1.2rem;
  color:#facc15;
}

/* FOOTER */
footer {
  padding:20px;
  text-align:center;
  font-size:12px;
  opacity:0.6;
}

/* FADE ANIMATION */
.fade {
  opacity:0;
  transform: translateY(40px);
  transition: all 1s ease;
}

.fade.show {
  opacity:1;
  transform: translateY(0);
}

/* MOBILE */
@media(max-width:768px){
  .hero h1 { font-size:2rem; }
}
</style>
</head>

<body>

<header>
  <img src="./assets/org-logo.webp">
  <nav>
    <a href="#">Home</a>
    <a href="#nominate">Nominate</a>
    <a href="#captains">Captains</a>
  </nav>
</header>

<section class="hero fade">
  <h1>GPL Cricket Tournament 🏏</h1>
  <p class="highlight">This year, captains will be girls</p>
  <button class="cta-btn" onclick="scrollToForm()">Nominate Now</button>
</section>

<section id="nominate" class="section fade">
  <h2>Nominate a Captain</h2>

  <form class="form-container" action="https://formspree.io/f/xeepqygr" method="POST" onsubmit="showConfetti()">

    <input type="hidden" name="_redirect" value="https://your-username.github.io/gpl-captain-site/thankyou.html">
    <input type="hidden" name="_subject" value="New GPL Captain Nomination">

    <input type="text" name="nominee_name" placeholder="Nominee Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="reason" placeholder="Why should they be captain?"></textarea>
    <input type="text" name="your_name" placeholder="Your Name">

    <button class="cta-btn">Submit Nomination</button>
  </form>
</section>

<section id="captains" class="section fade">
  <h2>Captains Announcement</h2>
  <p class="announcement">Captains will be announced soon 🎉</p>
</section>

<footer>
  © GPL Tournament | Powered by Golden Eagle 🦅
</footer>

<script>
// smooth scroll
function scrollToForm() {
  document.getElementById("nominate").scrollIntoView({ behavior: "smooth" });
}

// fade in
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});

document.querySelectorAll('.fade').forEach(el => observer.observe(el));

// confetti
function showConfetti() {
  const confetti = document.createElement("div");
  confetti.innerHTML = "🎉🎉🎉";
  confetti.style.position = "fixed";
  confetti.style.top = "50%";
  confetti.style.left = "50%";
  confetti.style.fontSize = "40px";
  document.body.appendChild(confetti);
  setTimeout(() => confetti.remove(), 1500);
}
</script>

</body>
</html>
