<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPL Cricket Tournament 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  color:white;
  background: radial-gradient(circle at top, #0f172a, #020617);
  overflow-x:hidden;
}

/* STADIUM LIGHT EFFECT */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 60%);
  z-index:-1;
}

/* HEADER */
header{
  display:flex;
  justify-content:center;
  padding:20px;
}

header img{
  height:55px;
}

/* HERO */
.hero{
  text-align:center;
  padding:30px 20px;
}

.hero h1{
  font-size:3rem;
  font-weight:700;
  letter-spacing:1px;
}

.highlight{
  color:#22c55e; /* pitch green */
  margin-top:10px;
  font-weight:500;
}

.meta{
  margin-top:8px;
  color:#94a3b8;
}

/* CRICKET BAT */
.bat{
  position:absolute;
  right:10%;
  top:20%;
  width:10px;
  height:120px;
  background:#facc15;
  transform:rotate(30deg);
  border-radius:5px;
  opacity:0.7;
}

/* CRICKET BALL */
.ball{
  position:absolute;
  left:10%;
  top:25%;
  width:14px;
  height:14px;
  background:#ef4444;
  border-radius:50%;
  box-shadow:0 0 10px rgba(239,68,68,0.8);
  animation:ballMove 4s infinite linear;
}

@keyframes ballMove{
  0%{transform:translateX(0)}
  100%{transform:translateX(120px)}
}

/* FORM */
.form-container{
  max-width:520px;
  margin:40px auto;
  background:rgba(15,23,42,0.9);
  padding:30px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 30px rgba(34,197,94,0.15);
}

h2{
  margin-bottom:15px;
}

input,textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:6px;
  background:#1e293b;
  color:white;
}

input:focus,textarea:focus{
  outline:none;
  border:1px solid #22c55e;
}

/* BUTTON */
.cta-btn{
  width:100%;
  margin-top:10px;
  background:#22c55e;
  color:black;
  padding:14px;
  border:none;
  border-radius:30px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.cta-btn:hover{
  background:#16a34a;
  transform:translateY(-2px);
}

/* ANNOUNCEMENT */
.section{
  text-align:center;
  padding:50px 20px;
}

.announcement{
  color:#22c55e;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  color:black;
  padding:12px 20px;
  border-radius:6px;
  opacity:0;
  transition:.3s;
}

.toast.show{opacity:1}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  opacity:0.6;
}

/* MOBILE */
@media(max-width:768px){
  .hero h1{font-size:2rem}
}
</style>
</head>

<body>

<div class="bat"></div>
<div class="ball"></div>

<header>
  <img src="./assets/org-logo.webp">
</header>

<section class="hero">
  <h1>GPL Cricket Tournament 2026 🏏</h1>
  <p class="highlight">This year, captains will be girls</p>
  <div class="meta">📅 4th April 2026</div>
</section>

<form class="form-container" onsubmit="handleSubmit(event)">
  <h2>Nominate a Captain</h2>

  <input type="text" placeholder="Nominee Name" required>
  <input type="email" placeholder="Your Email" required>
  <textarea placeholder="Why should they be captain?"></textarea>
  <input type="text" placeholder="Your Name">

  <button class="cta-btn">Submit Nomination</button>
</form>

<section class="section">
  <h2>Captains Announcement</h2>
  <p class="announcement">Captains will be announced soon 🎉</p>
</section>

<footer>
  © GPL Tournament 2026 | Golden Eagle 
</footer>

<div class="toast" id="toast">Nomination submitted 🎉</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
function handleSubmit(e){
  e.preventDefault();

  const duration=2000;
  const end=Date.now()+duration;

  (function frame(){
    confetti({particleCount:6,angle:60,spread:80,origin:{x:0}});
    confetti({particleCount:6,angle:120,spread:80,origin:{x:1}});
    if(Date.now()<end) requestAnimationFrame(frame);
  })();

  document.getElementById("toast").classList.add("show");
  setTimeout(()=>document.getElementById("toast").classList.remove("show"),3000);

  e.target.reset();
}
</script>

</body>
</html>
