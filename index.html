<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPL Tournament 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  color:white;
  overflow:hidden;

  /* STADIUM FIELD */
  background:
    radial-gradient(circle at center, rgba(0,0,0,0.6), transparent),
    linear-gradient(to bottom, #0f3d0f, #021a02);
}

/* FLOOD LIGHT EFFECT */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 50% 10%, rgba(255,255,255,0.15), transparent),
    radial-gradient(circle at 20% 10%, rgba(255,255,255,0.08), transparent),
    radial-gradient(circle at 80% 10%, rgba(255,255,255,0.08), transparent);
  animation:lightMove 8s infinite alternate;
  z-index:-1;
}

@keyframes lightMove{
  0%{transform:translateY(0)}
  100%{transform:translateY(-40px)}
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
}

.logo{
  height:40px;
  animation:float 4s infinite;
}
@keyframes float{
  50%{transform:translateY(-5px)}
}

/* HERO */
.hero{
  text-align:center;
  margin-top:40px;
}

/* TROPHY */
.trophy{
  font-size:60px;
  margin-top:20px;
  animation:drop 1.5s ease forwards;
  opacity:0;
}

@keyframes drop{
  0%{transform:translateY(-200px);opacity:0}
  100%{transform:translateY(0);opacity:1}
}

/* CAPTAINS */
.captain{
  font-size:2.2rem;
  margin:20px;
  opacity:0;
  transform:translateY(40px);
}

.show{
  animation:reveal 1s forwards;
}

@keyframes reveal{
  to{opacity:1;transform:translateY(0)}
}

.glow{
  color:#facc15;
  text-shadow:0 0 25px gold;
}

/* BALL ANIMATION */
.ball{
  position:fixed;
  width:14px;
  height:14px;
  background:red;
  border-radius:50%;
  top:60%;
  left:-20px;
  animation:ballMove 6s linear infinite;
}

@keyframes ballMove{
  0%{left:-20px}
  100%{left:110%}
}

/* TEAMS */
.teams{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:40px;
}

.team{
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.1);
  padding:20px;
  border-radius:10px;
  text-align:center;
  transition:.3s;
}

.team:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(34,197,94,0.5);
}

.captain-name{
  color:#facc15;
  font-weight:600;
}

/* TIE TEXT */
.tie{
  margin-top:10px;
  opacity:.8;
}
</style>
</head>

<body>

<div class="ball"></div>

<nav>
  <img src="assets/org-logo.webp" class="logo">
  <h2>GPL 🏏</h2>
</nav>

<section class="hero">
  <h1>🏏 Captain Announcement</h1>

  <div class="trophy">🏆</div>

  <div id="c1" class="captain">Mili</div>
  <div id="c2" class="captain">Isha Mishra</div>

  <p class="tie">
    Surbhi Baghel, Palak, Riya and Khushi tied (4 votes each). Final soon.
  </p>
</section>

<section class="teams">
  <div class="team">
    <h3>Team A</h3>
    <p class="captain-name">👑 Mili Neema</p>
  </div>

  <div class="team">
    <h3>Team B</h3>
    <p class="captain-name">👑 Isha Mishra</p>
  </div>

  <div class="team">
    <h3>Team C</h3>
    <p>Captain TBD</p>
  </div>

  <div class="team">
    <h3>Team D</h3>
    <p>Captain TBD</p>
  </div>
</section>

<!-- SOUND -->
<audio id="cheer" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1e1b.mp3?filename=cheering-6896.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
setTimeout(()=>{
  const c1=document.getElementById("c1");
  const c2=document.getElementById("c2");

  c1.classList.add("show","glow");

  setTimeout(()=>{
    c2.classList.add("show","glow");
  },1000);

  setTimeout(()=>{
    confetti({particleCount:200,spread:120});
    document.getElementById("cheer").play();
  },2000);

},1000);
</script>

</body>
</html>
